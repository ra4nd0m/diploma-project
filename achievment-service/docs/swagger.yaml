basePath: /
definitions:
  handlers.achievementResponseDTO:
    properties:
      access_mode:
        $ref: '#/definitions/handlers.lookupValueDTO'
      additional_detail:
        type: string
      cohort_id:
        type: integer
      condition_payload:
        type: object
      condition_type:
        $ref: '#/definitions/handlers.lookupValueDTO'
      description:
        type: string
      icon_link:
        type: string
      id:
        type: integer
      issuance_id:
        type: integer
      issuance_kind:
        $ref: '#/definitions/handlers.lookupValueDTO'
      name:
        type: string
      owner_id:
        type: string
      progress_payload:
        type: object
      status:
        $ref: '#/definitions/handlers.statusDTO'
    type: object
  handlers.createAchievementRequestDTO:
    properties:
      cohort_id:
        type: integer
      condition_payload:
        type: object
      condition_type:
        type: string
      description:
        type: string
      icon_link:
        type: string
      issuance_kind:
        type: string
      name:
        type: string
    type: object
  handlers.createAchievementResponseDTO:
    properties:
      id:
        type: integer
    type: object
  handlers.errorResponseDTO:
    properties:
      error:
        type: string
    type: object
  handlers.issueAchievementRequestDTO:
    properties:
      achievement_id:
        type: integer
      additional_detail:
        type: string
      recipient_id:
        type: string
    type: object
  handlers.issueAchievementResponseDTO:
    properties:
      id:
        type: integer
    type: object
  handlers.lookupValueDTO:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  handlers.statusDTO:
    properties:
      code:
        type: string
      id:
        type: integer
    type: object
info:
  contact: {}
  description: API for creating, issuing, and reading achievements.
  title: Achievement Service API
  version: "1.0"
paths:
  /achievements:
    get:
      description: Returns achievements visible to the authenticated user.
      parameters:
      - description: Comma-separated cohort IDs
        in: query
        name: cohort_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.achievementResponseDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
      security:
      - BearerAuth: []
      summary: Get visible achievements
      tags:
      - achievements
    post:
      consumes:
      - application/json
      description: Creates a new achievement in the specified cohort.
      parameters:
      - description: Create achievement payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.createAchievementRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.createAchievementResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
      security:
      - BearerAuth: []
      summary: Create achievement
      tags:
      - achievements
  /achievements/issue:
    post:
      consumes:
      - application/json
      description: Issues an achievement to a recipient.
      parameters:
      - description: Issue achievement payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handlers.issueAchievementRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.issueAchievementResponseDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
      security:
      - BearerAuth: []
      summary: Issue achievement
      tags:
      - achievements
  /achievements/owned:
    get:
      description: Returns achievements created by the authenticated user.
      parameters:
      - description: Comma-separated cohort IDs
        in: query
        name: cohort_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.achievementResponseDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
      security:
      - BearerAuth: []
      summary: Get owned achievements
      tags:
      - achievements
  /achievements/recipient/{recipientID}:
    get:
      description: Returns achievements of a specific recipient available to the authenticated
        user.
      parameters:
      - description: Recipient ID (UUID)
        in: path
        name: recipientID
        required: true
        type: string
      - description: Comma-separated cohort IDs
        in: query
        name: cohort_ids
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.achievementResponseDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.errorResponseDTO'
      security:
      - BearerAuth: []
      summary: Get recipient achievements
      tags:
      - achievements
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
